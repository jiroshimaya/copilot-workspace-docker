name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Validate compose config
        run: docker compose config

      - name: Build workspace image
        run: docker compose build workspace

      - name: Check repository hook files
        run: |
          test -f .github/hooks/notifications.json
          test -x scripts/notify.sh

      - name: Run workspace smoke test
        run: |
          docker compose run --rm workspace bash -ic '
            set -euo pipefail
            test "$PWD" = "/home/copilot/development"
            test "$DEVELOPMENT_DIR" = "/home/copilot/development"
            test -d "$HOME/development/worktrees"
            command -v bash tmux zellij gh git uv copilot
            alias copilot
          '

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [docker-smoke-test]
    if: always()
    steps:
      - name: Decide whether the all jobs succeeded
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
