services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        COPILOT_CLI_VERSION: "${COPILOT_CLI_VERSION:-latest}"
    image: copilot-workspace-docker/workspace:local
    init: true
    stdin_open: true
    tty: true
    working_dir: /home/copilot/development
    command: ["sleep", "infinity"]
    environment:
      #GH_TOKEN: "${GH_TOKEN:-}"
      #GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      #COPILOT_GITHUB_TOKEN: "${COPILOT_GITHUB_TOKEN:-}"
      COPILOT_HOST_GH_TOKEN: "${COPILOT_HOST_GH_TOKEN:-}"
      COPILOT_HOST_GH_GIT_PROTOCOL: "${COPILOT_HOST_GH_GIT_PROTOCOL:-https}"
      COPILOT_NTFY_TOPIC: "${COPILOT_NTFY_TOPIC:-}"
      COPILOT_NTFY_SERVER: "${COPILOT_NTFY_SERVER:-}"
      COPILOT_NTFY_PRIORITY: "${COPILOT_NTFY_PRIORITY:-}"
      COPILOT_NTFY_DEBUG_LOG: "${COPILOT_NTFY_DEBUG_LOG:-}"
      COPILOT_NTFY_TITLE: "${COPILOT_NTFY_TITLE:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    volumes:
      - type: volume
        source: copilot-workspace
        target: /home/copilot/development
      - type: volume
        source: copilot-gh-config
        target: /home/copilot/.config/gh
      - type: volume
        source: copilot-cli-config
        target: /home/copilot/.copilot

volumes:
  copilot-workspace:
  copilot-gh-config:
  copilot-cli-config:
